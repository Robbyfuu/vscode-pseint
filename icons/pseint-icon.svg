<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- PSe text (top, white) -->
  <text x="128" y="92"
        font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="78" font-weight="900" letter-spacing="-2"
        fill="#ffffff" text-anchor="middle">PSe</text>

  <!-- Assignment arrow (centered) -->
  <line x1="54" y1="135" x2="202" y2="135"
        stroke="#60a5fa" stroke-width="12"
        stroke-linecap="round"/>
  <polyline points="80,118 54,135 80,152"
            fill="none" stroke="#60a5fa" stroke-width="12"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Int text (bottom, accent blue) -->
  <text x="128" y="220"
        font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="78" font-weight="900" letter-spacing="-2"
        fill="#60a5fa" text-anchor="middle">Int</text>
</svg>
